<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sarkari Yojna Setu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Find government schemes by age, income, and sector in India">

  <!-- Favicon -->
  <link rel="icon" href="assets/icon.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <header class="header">
    <div class="logo-area">
      <h1>🇮🇳 Sarkari Yojna Setu</h1>
      <p>Your Bridge to Government Schemes</p>
    </div>

    <div class="header-actions">
      <button id="langBtn">🌐 हिंदी / English</button>
      <button onclick="resetFilters()">🔄 Reset</button>
    </div>
  </header>


  <!-- ================= HERO ================= -->
  <section class="hero">
    <h2 id="heroTitle">Find the Right Government Scheme for You</h2>

    <p id="heroSubtitle">
      Filter by age, income, sector and explore benefits easily
    </p>
  </section>


  <!-- ================= SEARCH ================= -->
  <section class="search-box">
    <div class="search-wrapper">

      <input 
        type="text" 
        id="searchInput" 
        placeholder="🔍 Search schemes..."
        data-en="🔍 Search schemes..."
        data-hi="🔍 योजनाएँ खोजें..."
        autocomplete="off"
      >

      <button id="searchBtn" onclick="searchSchemes()">
        Search
      </button>

    </div>
  </section>


  <!-- ================= FILTERS ================= -->
  <section class="filters">

    <!-- SECTOR -->
    <select id="sectorFilter">

      <option value="" id="sectorDefault">
        All Sectors
      </option>

      <option value="Health">Health</option>
      <option value="Education">Education</option>
      <option value="Agriculture">Agriculture</option>
      <option value="Housing">Housing</option>
      <option value="Business">Business</option>
      <option value="Skill">Skill</option>
      <option value="Finance">Finance</option>
      <option value="Women">Women</option>
      <option value="Social">Social</option>

    </select>


    <!-- GENDER -->
    <select id="genderFilter">

      <option value="" id="genderDefault">
        All Gender
      </option>

      <option value="Male">Male</option>
      <option value="Female">Female</option>
      <option value="All">All</option>

    </select>


    <!-- AGE -->
    <select id="ageFilter">

      <option value="" id="ageDefault">
        All Age
      </option>

      <option value="Child">Child</option>
      <option value="Youth">Youth</option>
      <option value="Adult">Adult</option>
      <option value="Senior">Senior</option>

    </select>


    <!-- INCOME -->
    <select id="incomeFilter">

      <option value="" id="incomeDefault">
        All Income
      </option>

      <option value="Low">Low</option>
      <option value="Middle">Middle</option>
      <option value="High">High</option>

    </select>

  </section>


  <!-- ================= TOP SCHEMES ================= -->
  <section class="section">

    <h2 class="section-title" id="topTitle">
      🔥 Top Schemes
    </h2>

    <div id="topContainer" class="cards"></div>

  </section>


  <!-- ================= SAVED SCHEMES ================= -->
  <section class="section">

    <h2 class="section-title" id="savedTitle">
      ⭐ Saved Schemes
    </h2>

    <div id="savedContainer" class="cards"></div>

  </section>


  <!-- ================= ALL SCHEMES ================= -->
  <main class="section">

    <h2 class="section-title" id="allTitle">
      📋 All Schemes
    </h2>

    <div id="container" class="cards"></div>

  </main>


  <!-- ================= MODAL ================= -->
  <div id="modal" class="modal hidden">

    <!-- BACKDROP -->
    <div class="modal-backdrop" onclick="closeModal()"></div>

    <!-- MODAL BOX -->
    <div class="modal-content">

      <!-- CLOSE -->
      <button class="close-btn" onclick="closeModal()">✖</button>

      <!-- TITLE -->
      <h2 id="modalTitle"></h2>

      <!-- MEDIA -->
      <div class="modal-media">

        <!-- IMAGE -->
        <img 
          id="modalImage" 
          alt="Scheme Image"
          loading="lazy"
          onerror="this.src='assets/images/default.jpg'"
        >

        <!-- VIDEO -->
        <video 
          id="modalVideo"
          controls
          playsinline
          preload="auto"
        >
          <source id="modalVideoSource" src="" type="video/mp4">
          Your browser does not support video.
        </video>

      </div>

      <!-- DESCRIPTION -->
      <div id="modalDesc" class="modal-text"></div>

      <!-- APPLY BUTTON -->
      <a 
        id="modalApplyBtn" 
        target="_blank" 
        class="apply-btn"
      >
        🚀 Apply Now
      </a>

    </div>
  </div>


  <!-- ================= FOOTER ================= -->
  <footer>

    <p>© 2026 Sarkari Yojna Setu</p>

    <p>
      Made for public awareness of government schemes 🇮🇳
    </p>

  </footer>


  <!-- ================= SCRIPT ================= -->
  <script src="script.js" defer></script>

</body>
</html>
